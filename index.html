<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 Calorie Tracker</h1>
            <button class="button" onabort="ToggleTheme()">🌙</button>
        </header>
    </div>


        <!-- Dashboard -->
    <div class="card">
        <h2>Daily Overview</h2>
        <div class="stats">
            <span>Goal: <span id="goal">2000</span></span>
            <span>Consumed: <span id="consumed">0</span></span>
            <span>Remaining: <span id="remaining">0</span></span>
        </div>

        <div class="progress">
            <div id="bar">
        </div>
        <p class="center" id="percent">0%</p>
    </div>
</body>
</html>
